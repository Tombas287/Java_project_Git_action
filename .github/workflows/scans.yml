      #     -Dsonar.projectKey=weather-api \
      #     -Dsonar.host.url=${{ secrets.SONAR_HOST }} \
      #     -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      # 🔵 TRIVY
      - name: Trivy Scan
        if: matrix.scan == 'trivy'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.image_name }}:${{inputs.image_tag }}
          format: table

