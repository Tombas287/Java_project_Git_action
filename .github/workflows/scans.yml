name: Reusable Scan Workflow

on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_tag:
        required: true
        type: string

    # secrets:
    #   SONAR_HOST:
    #     required: true
    #   SONAR_TOKEN:
    #     required: true
    #   BLACKDUCK_URL:
    #     required: true
    #   BLACKDUCK_TOKEN:
    #     required: true

jobs:
  scan:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        scan: [sonar, trivy, blackduck]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Set up JDK 21
      #   if: matrix.scan == 'sonar'
