name: CI pipeline 

on:
  workflow_dispatch:
    inputs:
      image_name: 
        description: "image name"
        required: true 
        type: string
      image_tag:
        description: "image tag"
        required: true
        type: string
      

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout stage 
        uses: actions/checkout@v4
        
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Maven build stage 
        run: mvn -X clean install -DskipTest 

      - name: List all files 
        run: ls -lh
      
      - name: Build Docker Image 
        run: |
          podman build  -t ${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }} .

  scans:
    needs: build
    uses: ./.github/workflows/scans.yml
    with: 
      image_name: ${{ github.event.inputs.image_name }}
      image_tag: ${{ github.event.inputs.image_tag }}




